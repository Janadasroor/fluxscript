name: FluxScript CI

on:
  push:
    branches: [ "master", "feature/*" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 21
        run: |
          wget -q https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 21
          sudo apt-get install -y libclang-21-dev clang-tidy-21 libmlir-21-dev mlir-21-tools

      - name: Install build tools
        run: sudo apt-get install -y cmake ninja-build ccache libeigen3-dev libcurl4-openssl-dev

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DLLVM_DIR=/usr/lib/llvm-21/lib/cmake/llvm -DMLIR_DIR=/usr/lib/llvm-21/lib/cmake/mlir -DNGSPICE_FOUND=OFF

      - name: Build
        run: ninja -C build

      - name: Run tests
        run: |
          rm -rf ~/.cache/fluxscript
          bash tests/integration/run_tests.sh -P 4

  create-release:
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 21
        run: |
          wget -q https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 21
          sudo apt-get install -y libclang-21-dev

      - name: Install build tools
        run: sudo apt-get install -y cmake ninja-build ccache libeigen3-dev libcurl4-openssl-dev

      - name: Build release binary
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DLLVM_DIR=/usr/lib/llvm-21/lib/cmake/llvm -DNGSPICE_FOUND=OFF
          ninja -C build

      - name: Package
        run: |
          mkdir -p dist
          tar czf dist/fluxscript-linux-x86_64.tar.gz -C build flux fluxc libFluxScript.so libFluxRuntime.a

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/fluxscript-linux-x86_64.tar.gz
          generate_release_notes: true
