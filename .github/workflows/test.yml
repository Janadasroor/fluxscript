name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  checks: write
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-x86_64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM + deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq wget lsb-release software-properties-common gnupg g++
          wget -q https://apt.llvm.org/llvm.sh && chmod +x llvm.sh && sudo ./llvm.sh 21 all
          sudo apt-get install -y -qq cmake libcurl4-openssl-dev

      - name: Cache Eigen
        id: cache-eigen
        uses: actions/cache@v4
        with:
          path: build/_deps/eigen-src
          key: eigen-3.4.0-${{ runner.os }}

      - name: Cache build
        id: cache-build
        uses: actions/cache@v4
        with:
          path: build
          key: build-${{ runner.os }}-${{ hashFiles('src/**/*.cpp', 'include/**/*.h', 'cli/**/*.cpp', 'tests/**/*.cpp', 'CMakeLists.txt', 'stdlib/*.flux') }}
          restore-keys: |
            build-${{ runner.os }}-

      - name: Configure
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_DIR=/usr/lib/llvm-21/lib/cmake/llvm \
            -DFLUX_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: cd build && ctest --output-on-failure -R "flux-test" -E "all-features|waveform-extraction|tiered-jit|module-system" -j$(nproc)

      - name: Package binary
        run: |
          mkdir -p dist
          cp build/flux dist/flux-linux-x86_64
          strip dist/flux-linux-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: flux-linux-x86_64
          path: dist/flux-linux-x86_64
          if-no-files-found: error

  linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM + deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq wget lsb-release software-properties-common gnupg g++
          wget -q https://apt.llvm.org/llvm.sh && chmod +x llvm.sh && sudo ./llvm.sh 21 all
          sudo apt-get install -y -qq cmake libcurl4-openssl-dev

      - name: Cache Eigen
        id: cache-eigen
        uses: actions/cache@v4
        with:
          path: build/_deps/eigen-src
          key: eigen-3.4.0-${{ runner.os }}

      - name: Cache build
        id: cache-build
        uses: actions/cache@v4
        with:
          path: build
          key: build-${{ runner.os }}-${{ hashFiles('src/**/*.cpp', 'include/**/*.h', 'cli/**/*.cpp', 'tests/**/*.cpp', 'CMakeLists.txt', 'stdlib/*.flux') }}
          restore-keys: |
            build-${{ runner.os }}-

      - name: Configure
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_DIR=/usr/lib/llvm-21/lib/cmake/llvm \
            -DFLUX_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: cd build && ctest --output-on-failure -R "flux-test" -E "all-features|waveform-extraction|tiered-jit|module-system" -j$(nproc)

      - name: Package binary
        run: |
          mkdir -p dist
          cp build/flux dist/flux-linux-arm64
          strip dist/flux-linux-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: flux-linux-arm64
          path: dist/flux-linux-arm64
          if-no-files-found: error

  macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM + deps
        run: |
          brew install llvm@21 eigen
          brew link --overwrite llvm@21

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: build
          key: build-macos-${{ hashFiles('src/**/*.cpp', 'include/**/*.h', 'cli/**/*.cpp', 'tests/**/*.cpp', 'CMakeLists.txt', 'stdlib/*.flux') }}
          restore-keys: |
            build-macos-

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_DIR="$(brew --prefix llvm@21)/lib/cmake/llvm" \
            -DClang_DIR="$(brew --prefix llvm@21)/lib/cmake/clang" \
            -DLLD_DIR="$(brew --prefix llvm@21)/lib/cmake/lld" \
            -DCMAKE_PREFIX_PATH="$(brew --prefix eigen)" \
            -DFLUX_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build -j$(sysctl -n hw.logicalcpu)

      - name: Test
        run: cd build && ctest --output-on-failure -R "flux-test" -E "all-features|waveform-extraction|tiered-jit|module-system" -j$(sysctl -n hw.logicalcpu)

      - name: Package binary
        run: |
          mkdir -p dist
          cp build/flux dist/flux-macos-arm64
          strip dist/flux-macos-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: flux-macos-arm64
          path: dist/flux-macos-arm64
          if-no-files-found: error

  windows-x86_64:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Cache LLVM
        id: cache-llvm
        uses: actions/cache@v4
        with:
          path: llvm-windows
          key: llvm-windows-21.1.0-v1

      - name: Download & extract LLVM
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          curl -L -o llvm.tar.xz https://github.com/llvm/llvm-project/releases/download/llvmorg-21.1.0/clang+llvm-21.1.0-x86_64-pc-windows-msvc.tar.xz
          & "C:\Program Files\7-Zip\7z.exe" x llvm.tar.xz -y | Out-Null
          & "C:\Program Files\7-Zip\7z.exe" x llvm.tar -ollvm-windows -y | Out-Null

      - name: Bridge DIA SDK
        shell: pwsh
        run: |
          $dia2022 = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\DIA SDK\lib\amd64"
          $dia2019 = "C:\Program Files (x86)\Microsoft Visual Studio\2019\Professional\DIA SDK\lib\amd64"
          if (-not (Test-Path "$dia2019\diaguids.lib") -and (Test-Path "$dia2022\diaguids.lib")) {
            New-Item -ItemType Directory -Force -Path $dia2019 | Out-Null
            Copy-Item "$dia2022\*" $dia2019 -Force | Out-Null
          }

      - name: Set LLVM_DIR
        shell: pwsh
        run: |
          $cfg = Get-ChildItem -Path llvm-windows -Recurse -Filter "LLVMConfig.cmake" | Select-Object -First 1
          echo "LLVM_DIR=$($cfg.DirectoryName)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: build
          key: build-windows-${{ hashFiles('src/**/*.cpp', 'include/**/*.h', 'cli/**/*.cpp', 'tests/**/*.cpp', 'CMakeLists.txt', 'stdlib/*.flux') }}
          restore-keys: |
            build-windows-

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DLLVM_DIR="$env:LLVM_DIR" -DFLUX_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        shell: pwsh
        run: |
          $llvmDll = Get-ChildItem -Path llvm-windows -Recurse -Filter "LLVM*.dll" | Select-Object -First 1
          if ($llvmDll) {
            $llvmBin = $llvmDll.DirectoryName
            $env:PATH = "$llvmBin;$env:PATH"
          }
          $fluxBin = Resolve-Path "build\Release"
          $env:PATH = "$fluxBin;$env:PATH"
          cd build
          ctest --output-on-failure -C Release -R "flux-test" -E "all-features|waveform-extraction|tiered-jit|module-system"

      - name: Package binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "build\Release\flux.exe" "dist\flux-windows-x86_64.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: flux-windows-x86_64
          path: dist/flux-windows-x86_64.exe
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux-x86_64, linux-arm64, macos-arm64, windows-x86_64]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p assets
          cp artifacts/flux-linux-x86_64/flux-linux-x86_64 assets/
          cp artifacts/flux-linux-arm64/flux-linux-arm64 assets/
          cp artifacts/flux-macos-arm64/flux-macos-arm64 assets/
          cp artifacts/flux-windows-x86_64/flux-windows-x86_64.exe assets/
          chmod +x assets/*

      - name: Write release notes
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          cat > release-notes.md <<- NOTEEND
          ## FluxScript ${TAG}

          ### Pre-built binaries

          | Platform | Binary |
          |----------|--------|
          | Linux x86_64 | \`flux-linux-x86_64\` |
          | Linux ARM64 | \`flux-linux-arm64\` |
          | macOS ARM64 | \`flux-macos-arm64\` |
          | Windows x86_64 | \`flux-windows-x86_64.exe\` |

          ### Requirements
          - LLVM 21 runtime libraries
          - Linux: glibc 2.31+
          - macOS: 14+
          - Windows: VC++ Redistributable 2022

          NOTEEND

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: FluxScript ${{ github.ref_name }}
          body_path: release-notes.md
          files: assets/*
