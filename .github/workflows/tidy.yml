name: Tidy
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clang-tidy:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install LLVM 21 + clang-tidy
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq wget lsb-release software-properties-common gnupg
          wget -q https://apt.llvm.org/llvm.sh && chmod +x llvm.sh && sudo ./llvm.sh 21 all
          sudo apt-get install -y -qq libeigen3-dev
      - name: Generate compile_commands.json
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DLLVM_DIR=/usr/lib/llvm-21/lib/cmake/llvm \
            -DClang_DIR=/usr/lib/llvm-21/lib/cmake/clang \
            -DLLD_DIR=/usr/lib/llvm-21/lib/cmake/lld
      - name: Run clang-tidy
        run: |
          find src/compiler/ include/flux/compiler/ \
            -name '*.cpp' -o -name '*.h' -o -name '*.hpp' \
            | grep -v 'liveness_analysis\|codegen_context\|ast_core\|ast_control_flow\|ast_data\|ast_declarations\|ast_spice\|ast_mixed_signal' \
            | xargs clang-tidy-21 -p build/ \
              --header-filter='fluxscript/(src|include)/((?!codegen_context).)*' \
              --checks='-*,clang-analyzer-core.*,clang-analyzer-cplusplus.*,clang-analyzer-unix.*,bugprone-use-after-move,bugprone-unused-return-value' \
              --warnings-as-errors='clang-analyzer-core.*,clang-analyzer-cplusplus.*,clang-analyzer-unix.*,bugprone-use-after-move,bugprone-unused-return-value' 2>&1
