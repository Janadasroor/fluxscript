name: CI
on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      linux-x86_64:
        type: boolean
        default: true
        description: Linux x86_64
      linux-arm64:
        type: boolean
        default: true
        description: Linux ARM64
      macos-arm64:
        type: boolean
        default: true
        description: macOS ARM64
      windows:
        type: boolean
        default: true
        description: Windows x86_64
      android-arm:
        type: boolean
        default: true
        description: Android arm64
      android-x86:
        type: boolean
        default: true
        description: Android x86_64

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------
  # Linux x86_64 — Docker for glibc 2.31 compatibility (ubuntu:20.04)
  # ------------------------------------------------------------------
  linux-x86_64:
    if: github.event_name != 'workflow_dispatch' || inputs.linux-x86_64 == 'true'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Build + test inside ubuntu:20.04 container
        run: |
          docker run --rm -v $PWD:/src -w /src \
            ubuntu:20.04 \
            bash -xe -c "
              apt-get update -qq &&
              apt-get install -y -qq wget lsb-release software-properties-common gnupg &&
              wget -q https://apt.llvm.org/llvm.sh && chmod +x llvm.sh && ./llvm.sh 21 all &&
              apt-get install -y -qq libclang-21-dev liblld-21-dev cmake libcurl4-openssl-dev patchelf g++ &&
              cmake -B build -DCMAKE_BUILD_TYPE=Release \
                -DLLVM_DIR=/usr/lib/llvm-21/lib/cmake/llvm \
                -DClang_DIR=/usr/lib/llvm-21/lib/cmake/clang \
                -DLLD_DIR=/usr/lib/llvm-21/lib/cmake/lld &&
              cmake --build build -j\$(nproc) &&
              cmake --build build --target flux 2>/dev/null &&
              cd build && ctest --output-on-failure -j\$(nproc) || true
            "

      - name: Package (tag only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          docker run --rm -v $PWD:/src -w /src \
            ubuntu:20.04 \
            bash -xe -c "
              apt-get update -qq &&
              apt-get install -y -qq wget gnupg lsb-release software-properties-common patchelf &&
              wget -q https://apt.llvm.org/llvm.sh && chmod +x llvm.sh && ./llvm.sh 21 all &&
              mkdir -p install/include install/lib &&
              cp -r /src/include/flux install/include/ &&
              cp /src/build/libFluxScript.so install/lib/ &&
              LLVM_REAL=\"\$(readlink -f /usr/lib/llvm-21/lib/libLLVM-21.so)\" &&
              if [ -n \"\$LLVM_REAL\" ]; then
                cp -L \"\$LLVM_REAL\" install/lib/ &&
                ln -sf \"\$(basename \"\$LLVM_REAL\")\" install/lib/libLLVM-21.so;
              fi &&
              for lib in \$(ldd install/lib/libFluxScript.so | grep '=> /' | awk '{print \$3}' | sort -u); do
                basename=\$(basename \"\$lib\");
                case \"\$basename\" in
                  libc.so.*|libm.so.*|libstdc++.so.*|libgcc_s.so.*|ld-linux-*|libpthread*|librt*|libdl*) ;;
                  *) if [ ! -f \"install/lib/\$basename\" ]; then cp -L \"\$lib\" install/lib/; fi ;;
                esac;
              done &&
              patchelf --set-rpath '\$ORIGIN' install/lib/libFluxScript.so &&
              tar czf fluxscript-linux-x86_64.tar.gz -C install .
            "

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: fluxscript-linux-x86_64.tar.gz

  # ------------------------------------------------------------------
  # Linux ARM64 — native arm runner
  # ------------------------------------------------------------------
  linux-arm64:
    if: github.event_name != 'workflow_dispatch' || inputs.linux-arm64 == 'true'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq wget lsb-release software-properties-common gnupg
          wget -q https://apt.llvm.org/llvm.sh && chmod +x llvm.sh && sudo ./llvm.sh 21 all
          sudo apt-get install -y -qq libclang-21-dev liblld-21-dev cmake libcurl4-openssl-dev g++

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_DIR=/usr/lib/llvm-21/lib/cmake/llvm \
            -DClang_DIR=/usr/lib/llvm-21/lib/cmake/clang \
            -DLLD_DIR=/usr/lib/llvm-21/lib/cmake/lld
          cmake --build build -j$(nproc)

      - name: Test
        run: cd build && ctest --output-on-failure -j$(nproc) || true

      - name: Package
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p install/include install/lib
          cp -r include/flux install/include/
          cp build/libFluxScript.so install/lib/
          tar czf fluxscript-linux-arm64.tar.gz -C install .

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: fluxscript-linux-arm64.tar.gz

  # ------------------------------------------------------------------
  # macOS ARM64
  # ------------------------------------------------------------------
  macos-arm64:
    if: github.event_name != 'workflow_dispatch' || inputs.macos-arm64 == 'true'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: brew install llvm@21 eigen

      - name: Build
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_DIR="$(brew --prefix llvm@21)/lib/cmake/llvm" \
            -DClang_DIR="$(brew --prefix llvm@21)/lib/cmake/clang" \
            -DLLD_DIR="$(brew --prefix llvm@21)/lib/cmake/lld" \
            -DCMAKE_PREFIX_PATH="$(brew --prefix eigen)"
          cmake --build build -j$(sysctl -n hw.logicalcpu)

      - name: Test
        run: cd build && ctest --output-on-failure -j$(sysctl -n hw.logicalcpu) || true

      - name: Package
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p install/include install/lib
          cp -r include/flux install/include/
          cp build/libFluxScript.dylib install/lib/
          for lib in $(otool -L install/lib/libFluxScript.dylib | grep -E "^\s+/opt/homebrew|^\s+/usr/local" | awk '{print $1}'); do
            basename=$(basename "$lib")
            [ ! -f "install/lib/$basename" ] && cp -L "$lib" install/lib/
          done
          for lib in install/lib/*.dylib*; do
            install_name_tool -id "@rpath/$(basename "$lib")" "$lib" 2>/dev/null || true
            for dep in $(otool -L "$lib" | grep -E "^\s+/opt/homebrew|^\s+/usr/local" | awk '{print $1}'); do
              depname=$(basename "$dep")
              install_name_tool -change "$dep" "@rpath/$depname" "$lib" 2>/dev/null || true
            done
          done
          tar czf fluxscript-macos-arm64.tar.gz -C install .

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: fluxscript-macos-arm64.tar.gz

  # ------------------------------------------------------------------
  # Windows x86_64
  # ------------------------------------------------------------------
  windows-x86_64:
    if: github.event_name != 'workflow_dispatch' || inputs.windows == 'true'
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Cache LLVM
        id: cache-llvm
        uses: actions/cache@v4
        with:
          path: llvm-windows
          key: llvm-windows-21.1.0-v1

      - name: Download & extract LLVM
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          curl -L -o llvm.tar.xz https://github.com/llvm/llvm-project/releases/download/llvmorg-21.1.0/clang+llvm-21.1.0-x86_64-pc-windows-msvc.tar.xz
          & "C:\Program Files\7-Zip\7z.exe" x llvm.tar.xz -y | Out-Null
          & "C:\Program Files\7-Zip\7z.exe" x llvm.tar -ollvm-windows -y | Out-Null

      - name: Set LLVM_DIR
        shell: pwsh
        run: |
          $cfg = Get-ChildItem -Path llvm-windows -Recurse -Filter "LLVMConfig.cmake" | Select-Object -First 1
          echo "LLVM_DIR=$($cfg.DirectoryName)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Bridge DIA SDK
        shell: pwsh
        run: |
          $dia2019 = "C:\Program Files (x86)\Microsoft Visual Studio\2019\Professional\DIA SDK\lib\amd64"
          $dia2022 = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\DIA SDK\lib\amd64"
          if (-not (Test-Path "$dia2019\diaguids.lib") -and (Test-Path "$dia2022\diaguids.lib")) {
            New-Item -ItemType Directory -Force -Path $dia2019 | Out-Null
            Copy-Item "$dia2022\*" $dia2019 -Force | Out-Null
            echo "Bridged DIA SDK from VS 2022 to VS 2019 path"
          }

      - name: Build
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DLLVM_DIR="$env:LLVM_DIR"

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: cd build && ctest --output-on-failure -C Release || true

      - name: Package
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path install\include, install\lib | Out-Null
          copy include\flux install\include\ -Recurse
          copy build\Release\FluxScript.dll install\lib\
          copy build\Release\FluxScript.lib install\lib\
          $llvmDlls = Get-ChildItem -Path llvm-windows -Recurse -Filter "LLVM*.dll"
          if ($llvmDlls) {
            Copy-Item $llvmDlls.FullName install\lib\
          }
          Compress-Archive -Path install\* -DestinationPath fluxscript-windows-x86_64.zip

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: fluxscript-windows-x86_64.zip

  # ------------------------------------------------------------------
  # Android arm64
  # ------------------------------------------------------------------
  android-arm64:
    if: github.event_name != 'workflow_dispatch' || inputs.android-arm == 'true'
    runs-on: ubuntu-22.04
    env:
      ANDROID_ABI: arm64-v8a
      LLVM_ARCH: aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: sudo apt-get update -qq && sudo apt-get install -y -qq build-essential cmake ninja-build curl unzip

      - name: Cache NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: android-ndk-r27c
          key: android-ndk-r27c-linux-v1

      - name: Download NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: curl -fsSL -o ndk.zip https://dl.google.com/android/repository/android-ndk-r27c-linux.zip && unzip -q ndk.zip

      - name: Cache LLVM for Android
        id: cache-llvm
        uses: actions/cache@v4
        with:
          path: llvm-android
          key: llvm-android-${{ env.LLVM_ARCH }}-v6

      - name: Download LLVM
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        run: |
          curl -fsSL -o llvm-android.tar.xz \
            https://github.com/Janadasroor/llvm-releases/releases/download/llvm-21.1.0-v6/llvm-android-${{ env.LLVM_ARCH }}.tar.xz
          mkdir -p llvm-android && tar xf llvm-android.tar.xz -C llvm-android

      - name: Cache Eigen
        id: cache-eigen
        uses: actions/cache@v4
        with:
          path: third_party/eigen
          key: eigen-3.4.0-v1

      - name: Download Eigen
        if: steps.cache-eigen.outputs.cache-hit != 'true'
        run: |
          curl -fsSL -A "Mozilla/5.0" -o eigen-3.4.0.tar.bz2 \
            https://gitlab.com/libeigen/eigen/-/archive/3.4.0/eigen-3.4.0.tar.bz2
          mkdir -p third_party && tar xf eigen-3.4.0.tar.bz2 -C third_party --strip-components=1

      - name: Build
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/android-ndk-r27c/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI="${{ env.ANDROID_ABI }}" \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_DIR="${{ github.workspace }}/llvm-android/lib/cmake/llvm" \
            -DFLUX_VIO_MATRIXC_LIB_DIR=""
          cmake --build build -j$(nproc)

      - name: Package
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p install/include install/lib
          cp -r include/flux install/include/
          cp build/libFluxScript.so install/lib/
          tar czf fluxscript-android-arm64.tar.gz -C install .

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: fluxscript-android-arm64.tar.gz

  # ------------------------------------------------------------------
  # Android x86_64
  # ------------------------------------------------------------------
  android-x86_64:
    if: github.event_name != 'workflow_dispatch' || inputs.android-x86 == 'true'
    runs-on: ubuntu-22.04
    env:
      ANDROID_ABI: x86_64
      LLVM_ARCH: x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: sudo apt-get update -qq && sudo apt-get install -y -qq build-essential cmake ninja-build curl unzip

      - name: Cache NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: android-ndk-r27c
          key: android-ndk-r27c-linux-v1

      - name: Download NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: curl -fsSL -o ndk.zip https://dl.google.com/android/repository/android-ndk-r27c-linux.zip && unzip -q ndk.zip

      - name: Cache LLVM for Android
        id: cache-llvm
        uses: actions/cache@v4
        with:
          path: llvm-android
          key: llvm-android-${{ env.LLVM_ARCH }}-v6

      - name: Download LLVM
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        run: |
          curl -fsSL -o llvm-android.tar.xz \
            https://github.com/Janadasroor/llvm-releases/releases/download/llvm-21.1.0-v6/llvm-android-${{ env.LLVM_ARCH }}.tar.xz
          mkdir -p llvm-android && tar xf llvm-android.tar.xz -C llvm-android

      - name: Cache Eigen
        id: cache-eigen
        uses: actions/cache@v4
        with:
          path: third_party/eigen
          key: eigen-3.4.0-v1

      - name: Download Eigen
        if: steps.cache-eigen.outputs.cache-hit != 'true'
        run: |
          curl -fsSL -A "Mozilla/5.0" -o eigen-3.4.0.tar.bz2 \
            https://gitlab.com/libeigen/eigen/-/archive/3.4.0/eigen-3.4.0.tar.bz2
          mkdir -p third_party && tar xf eigen-3.4.0.tar.bz2 -C third_party --strip-components=1

      - name: Build
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/android-ndk-r27c/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI="${{ env.ANDROID_ABI }}" \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_DIR="${{ github.workspace }}/llvm-android/lib/cmake/llvm" \
            -DFLUX_VIO_MATRIXC_LIB_DIR=""
          cmake --build build -j$(nproc)

      - name: Package
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p install/include install/lib
          cp -r include/flux install/include/
          cp build/libFluxScript.so install/lib/
          tar czf fluxscript-android-x86_64.tar.gz -C install .

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: fluxscript-android-x86_64.tar.gz
