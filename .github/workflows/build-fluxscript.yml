name: Build FluxScript
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            arch: x86_64
            artifact: linux-x86_64
          - os: ubuntu-24.04-arm
            arch: aarch64
            artifact: linux-aarch64
          - os: macos-14
            arch: arm64
            artifact: macos-arm64
          - os: windows-2022
            arch: x86_64
            artifact: windows-x86_64
          - os: ubuntu-22.04
            arch: aarch64
            artifact: android-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM + curl (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install curl
          curl -L -o llvm.tar.xz https://github.com/llvm/llvm-project/releases/download/llvmorg-21.1.0/clang+llvm-21.1.0-x86_64-pc-windows-msvc.tar.xz
          & "C:\Program Files\7-Zip\7z.exe" x llvm.tar.xz -y | Out-Null
          & "C:\Program Files\7-Zip\7z.exe" x llvm.tar -y | Out-Null
          $dirName = "clang+llvm-21.1.0-x86_64-pc-windows-msvc"
          $cfg = Get-ChildItem -Path $dirName -Recurse -Filter "LLVMConfig.cmake" -ErrorAction SilentlyContinue `
                 | Select-Object -First 1
          if ($cfg) {
              echo "LLVM_DIR=$($cfg.DirectoryName)" | Out-File -FilePath $env:GITHUB_ENV -Append
              echo "Found LLVM cmake: $($cfg.FullName)"
              echo "LLVM_ROOT=$(Resolve-Path $dirName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          } else {
              echo "LLVMConfig.cmake not found in $dirName!"
              Get-ChildItem $dirName -Recurse -Filter "*.cmake" -ErrorAction SilentlyContinue | Select-Object -First 30
              exit 1
          }
          $dia2019 = "C:\Program Files (x86)\Microsoft Visual Studio\2019\Professional\DIA SDK\lib\amd64"
          $dia2022 = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\DIA SDK\lib\amd64"
          if (-not (Test-Path "$dia2019\diaguids.lib") -and (Test-Path "$dia2022\diaguids.lib")) {
              New-Item -ItemType Directory -Force -Path $dia2019 | Out-Null
              Copy-Item "$dia2022\*" $dia2019 -Force | Out-Null
              echo "Bridged DIA SDK from VS 2022 to VS 2019 path"
          }

      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm@21 eigen
          echo "LLVM_PREFIX=$(brew --prefix llvm@21)" >> "$GITHUB_ENV"

      - name: Build & Package (Linux)
        if: runner.os == 'Linux' && matrix.artifact != 'android-aarch64'
        run: |
          docker run --rm -v $PWD:/src -w /src \
            ubuntu:20.04 \
            bash -xe -c "
              apt-get update -qq &&
              apt-get install -y -qq wget lsb-release software-properties-common gnupg &&
              wget -q https://apt.llvm.org/llvm.sh && chmod +x llvm.sh && ./llvm.sh 21 all &&
              apt-get install -y -qq libclang-21-dev liblld-21-dev cmake libcurl4-openssl-dev patchelf g++ &&
              cmake -B build -DCMAKE_BUILD_TYPE=Release \
                -DLLVM_DIR=/usr/lib/llvm-21/lib/cmake/llvm \
                -DClang_DIR=/usr/lib/llvm-21/lib/cmake/clang \
                -DLLD_DIR=/usr/lib/llvm-21/lib/cmake/lld &&
              cmake --build build -j\$(nproc) &&
              mkdir -p install/include install/lib &&
              cp -r include/flux install/include/ &&
              cp build/libFluxScript.so install/lib/ &&
              LLVM_REAL=\"\$(readlink -f /usr/lib/llvm-21/lib/libLLVM-21.so)\" &&
              cp -L \"\$LLVM_REAL\" install/lib/ &&
              ln -sf \"\$(basename \"\$LLVM_REAL\")\" install/lib/libLLVM-21.so &&
              for lib in \$(ldd install/lib/libFluxScript.so 2>/dev/null | grep '=> /' | awk '{print \$3}' | sort -u); do
                basename=\$(basename \"\$lib\")
                case \"\$basename\" in
                  libc.so.*|libm.so.*|libstdc++.so.*|libgcc_s.so.*|ld-linux-*|libpthread*|librt*|libdl*) ;;
                  *) if [ ! -f \"install/lib/\$basename\" ]; then cp -L \"\$lib\" install/lib/; fi ;;
                esac
              done &&
              patchelf --set-rpath '\$ORIGIN' install/lib/libFluxScript.so &&
              tar czf fluxscript-\${{ matrix.artifact }}.tar.gz -C install .
            "

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release `
            -DLLVM_DIR="$env:LLVM_DIR"
          cmake --build build --config Release

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_DIR="$LLVM_PREFIX/lib/cmake/llvm" \
            -DClang_DIR="$LLVM_PREFIX/lib/cmake/clang" \
            -DLLD_DIR="$LLVM_PREFIX/lib/cmake/lld" \
            -DCMAKE_PREFIX_PATH="$(brew --prefix eigen)"
          cmake --build build -j$(sysctl -n hw.logicalcpu)

      - name: Install deps (Android)
        if: matrix.artifact == 'android-aarch64'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential cmake ninja-build curl unzip

      - name: Setup Android NDK
        if: matrix.artifact == 'android-aarch64'
        run: |
          curl -fsSL -o ndk.zip \
            https://dl.google.com/android/repository/android-ndk-r27c-linux.zip
          unzip -q ndk.zip
          echo "ANDROID_NDK_HOME=$(pwd)/android-ndk-r27c" >> "$GITHUB_ENV"

      - name: Restore LLVM Android from cache
        if: matrix.artifact == 'android-aarch64'
        id: cache-llvm-android
        uses: actions/cache/restore@v4
        with:
          path: |
            llvm-native
            llvm-android
          key: llvm-21.1.0-android-arm64-ndk-r27c-v3
          fail-on-cache-miss: false

      - name: Build LLVM for Android
        if: matrix.artifact == 'android-aarch64' && steps.cache-llvm-android.outputs.cache-hit != 'true'
        run: |
          set -xe
          rm -rf llvm-native llvm-android llvm-project

          curl -fsSL -o llvm-project.tar.xz \
            https://github.com/llvm/llvm-project/releases/download/llvmorg-21.1.0/llvm-project-21.1.0.src.tar.xz
          tar xf llvm-project.tar.xz
          LLVM_SRC="$(pwd)/llvm-project-21.1.0.src/llvm"

          # Build host tablegen tools
          cmake -G Ninja -B llvm-native -S "$LLVM_SRC" \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_TARGETS_TO_BUILD=AArch64 \
            -DLLVM_INCLUDE_TESTS=OFF \
            -DLLVM_INCLUDE_EXAMPLES=OFF \
            -DLLVM_INCLUDE_BENCHMARKS=OFF \
            -DLLVM_ENABLE_PROJECTS=""
          cmake --build llvm-native --target llvm-tblgen -j$(nproc)

          # Cross-build LLVM shared library for Android arm64
          NDK="$ANDROID_NDK_HOME"
          cmake -G Ninja -B llvm-android -S "$LLVM_SRC" \
            -DCMAKE_TOOLCHAIN_FILE="$NDK/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_TARGETS_TO_BUILD=AArch64 \
            -DLLVM_TABLEGEN="$(pwd)/llvm-native/bin/llvm-tblgen" \
            -DLLVM_INCLUDE_TESTS=OFF \
            -DLLVM_INCLUDE_EXAMPLES=OFF \
            -DLLVM_INCLUDE_BENCHMARKS=OFF \
            -DLLVM_ENABLE_PROJECTS="" \
            -DLLVM_BUILD_LLVM_DYLIB=ON \
            -DLLVM_LINK_LLVM_DYLIB=ON \
            -DLLVM_ENABLE_TERMINFO=OFF \
            -DLLVM_ENABLE_ZLIB=OFF \
            -DLLVM_ENABLE_ZSTD=OFF
          cmake --build llvm-android --target LLVM -j$(nproc)

      - name: Save LLVM Android to cache
        if: matrix.artifact == 'android-aarch64' && steps.cache-llvm-android.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            llvm-native
            llvm-android
          key: llvm-21.1.0-android-arm64-ndk-r27c-v3

      - name: Build FluxScript for Android
        if: matrix.artifact == 'android-aarch64'
        run: |
          set -xe

          # Fetch Eigen (header-only, no build needed)
          curl -fsSL -A "Mozilla/5.0" -o eigen-3.4.0.tar.bz2 \
            https://gitlab.com/libeigen/eigen/-/archive/3.4.0/eigen-3.4.0.tar.bz2
          mkdir -p third_party
          tar xf eigen-3.4.0.tar.bz2 -C third_party --strip-components=1

          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_DIR="$(pwd)/llvm-android/lib/cmake/llvm" \
            -DLLVM_LIBRARY_DIR="$(pwd)/llvm-android/lib" \
            -DFLUX_VIO_MATRIXC_LIB_DIR=""
          cmake --build build -j$(nproc)

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p install/include install/lib
          cp -r include/flux install/include/
          cp build/libFluxScript.dylib install/lib/

          for lib in $(otool -L install/lib/libFluxScript.dylib | grep -E "^\s+/opt/homebrew|^\s+/usr/local" | awk '{print $1}'); do
            basename=$(basename "$lib")
            [ ! -f "install/lib/$basename" ] && cp -L "$lib" install/lib/
          done

          for lib in install/lib/*.dylib*; do
            install_name_tool -id "@rpath/$(basename "$lib")" "$lib" 2>/dev/null || true
            for dep in $(otool -L "$lib" | grep -E "^\s+/opt/homebrew|^\s+/usr/local" | awk '{print $1}'); do
              depname=$(basename "$dep")
              install_name_tool -change "$dep" "@rpath/$depname" "$lib" 2>/dev/null || true
            done
          done

          tar czf fluxscript-${{ matrix.artifact }}.tar.gz -C install .

      - name: Package (Android)
        if: matrix.artifact == 'android-aarch64'
        run: |
          set -xe
          mkdir -p install/include install/lib
          cp -r include/flux install/include/
          cp build/libFluxScript.so install/lib/
          cp llvm-android/lib/libLLVM-21.so install/lib/
          tar czf fluxscript-android-aarch64.tar.gz -C install .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path install\include, install\lib | Out-Null
          copy include\flux install\include\ -Recurse
          copy build\Release\FluxScript.dll install\lib\
          copy build\Release\FluxScript.lib install\lib\

          $llvmRoot = $env:LLVM_ROOT
          $llvmDlls = Get-ChildItem -Path "$llvmRoot\bin" -Filter "LLVM*.dll"
          Copy-Item $llvmDlls.FullName install\lib\

          Compress-Archive -Path install\* -DestinationPath fluxscript-${{ matrix.artifact }}.zip

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: fluxscript-${{ matrix.artifact }}.*