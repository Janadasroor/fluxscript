name: Build FluxScript
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-24.04, windows-2022]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            lsb-release wget software-properties-common gnupg \
            libcurl4-openssl-dev libeigen3-dev \
            patchelf

      - name: Install LLVM 21 (Linux)
        if: runner.os == 'Linux'
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 21
          sudo apt-get install -y libclang-21-dev liblld-21-dev

      - name: Install LLVM + curl (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install curl
          # Pre-installed LLVM 20.1.8 from Chocolatey is missing LLVMConfig.cmake,
          # so download the official LLVM binary which includes cmake config files.
          # Use 7z (pre-installed on GH runner) to extract the NSIS installer.
          curl -L -o LLVM.exe https://github.com/llvm/llvm-project/releases/download/llvmorg-20.1.8/LLVM-20.1.8-win64.exe
          & "C:\Program Files\7-Zip\7z.exe" x LLVM.exe -oLLVM -y | Out-Null
          $cfg = Get-ChildItem -Path "LLVM" -Recurse -Filter "LLVMConfig.cmake" | Select-Object -First 1
          if ($cfg) {
              echo "LLVM_DIR=$($cfg.DirectoryName)" | Out-File -FilePath $env:GITHUB_ENV -Append
              echo "Found LLVM cmake: $($cfg.FullName)"
          } else {
              echo "LLVMConfig.cmake not found after extraction!"
              Get-ChildItem LLVM -Recurse -Filter "*.cmake" | Select-Object -First 20
              exit 1
          }

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_DIR=/usr/lib/llvm-21/lib/cmake/llvm \
            -DClang_DIR=/usr/lib/llvm-21/lib/cmake/clang \
            -DLLD_DIR=/usr/lib/llvm-21/lib/cmake/lld
          cmake --build build -j$(nproc)

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release `
            -DLLVM_DIR="$env:LLVM_DIR"
          cmake --build build -j --config Release

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p install/include install/lib
          cp -r include/flux install/include/
          cp build/libFluxScript.so install/lib/

          # Bundle LLVM shared library and its non-standard deps
          LLVM_REAL="$(readlink -f /usr/lib/llvm-21/lib/libLLVM-21.so)"
          cp -L "$LLVM_REAL" install/lib/
          ln -sf "$(basename "$LLVM_REAL")" install/lib/libLLVM-21.so

          # Bundle all non-standard deps of libFluxScript.so and LLVM
          for lib in $(ldd install/lib/libFluxScript.so "$LLVM_REAL" | grep "=> /" | awk '{print $3}' | sort -u); do
            basename=$(basename "$lib")
            case "$basename" in
              libc.so.*|libm.so.*|libstdc++.so.*|libgcc_s.so.*|ld-linux-*|libpthread*|librt*|libdl*) ;;
              *) [ ! -f "install/lib/$basename" ] && cp -L "$lib" install/lib/ ;;
            esac
          done

          patchelf --set-rpath '$ORIGIN' install/lib/libFluxScript.so
          tar czf fluxscript-linux-x86_64.tar.gz -C install .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mkdir install\include install\lib
          copy include\flux install\include\ -Recurse
          copy build\Release\FluxScript.dll install\lib\
          copy build\Release\FluxScript.lib install\lib\

          # Find LLVM DLLs from the LLVM installation
          $llvmDir = "C:\Program Files\LLVM"
          $llvmDlls = Get-ChildItem -Path "$llvmDir\bin" -Filter "LLVM*.dll"
          Copy-Item $llvmDlls.FullName install\lib\

          # Bundle CURL DLL from build dependencies
          $curlDll = Get-ChildItem -Path "vcpkg_installed" -Filter "libcurl*.dll" -Recurse -ErrorAction SilentlyContinue
          if ($curlDll) { Copy-Item $curlDll.FullName install\lib\ }

          Compress-Archive -Path install\* -DestinationPath fluxscript-windows-x86_64.zip

      - name: Upload release asset (Linux)
        if: runner.os == 'Linux' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: fluxscript-linux-x86_64.tar.gz

      - name: Upload release asset (Windows)
        if: runner.os == 'Windows' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: fluxscript-windows-x86_64.zip
