name: Build FluxScript
on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            lsb-release wget software-properties-common gnupg \
            libcurl4-openssl-dev libeigen3-dev

      - name: Install LLVM 18
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 18
          sudo apt-get install -y libclang-18-dev liblld-18-dev

      - name: Build
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_DIR=/usr/lib/llvm-18/lib/cmake/llvm \
            -DClang_DIR=/usr/lib/llvm-18/lib/cmake/clang \
            -DLLD_DIR=/usr/lib/llvm-18/lib/cmake/lld
          cmake --build build -j$(nproc)

      - name: Package
        run: |
          mkdir -p install/include install/lib
          cp -r include/flux install/include/
          cp build/libfluxscript.a install/lib/
          # Record LLVM version needed at link time
          echo "LLVM 18 required" > install/REQUIRES.txt
          tar czf fluxscript-linux-x86_64.tar.gz -C install .

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: fluxscript-linux-x86_64.tar.gz
