name: Lint
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clang-format:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format-21
        run: |
          wget -q https://apt.llvm.org/llvm.sh && chmod +x llvm.sh
          sudo ./llvm.sh 21
          sudo apt-get install -y -qq clang-format-21
      - name: Check formatting
        run: |
          failed=0
          while IFS= read -r f; do
            if ! clang-format-21 -n "$f" 2>&1; then
              echo "::error file=$f::needs formatting"
              failed=1
            fi
          done < <(find src include cli -name "*.cpp" -o -name "*.h" -o -name "*.hpp")
          exit $failed

  clang-tidy:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install LLVM 21 + clang-tidy
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq wget lsb-release software-properties-common gnupg
          wget -q https://apt.llvm.org/llvm.sh && chmod +x llvm.sh && sudo ./llvm.sh 21 all
          sudo apt-get install -y -qq libeigen3-dev
      - name: Generate compile_commands.json
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DLLVM_DIR=/usr/lib/llvm-21/lib/cmake/llvm \
            -DClang_DIR=/usr/lib/llvm-21/lib/cmake/clang \
            -DLLD_DIR=/usr/lib/llvm-21/lib/cmake/lld
      - name: Run clang-tidy
        run: |
          find src/compiler/ include/flux/compiler/ include/flux/runtime/ include/flux/jit/ \
            -name '*.cpp' -o -name '*.h' -o -name '*.hpp' \
            | grep -v 'liveness_analysis.cpp' \
            | xargs clang-tidy-21 -p build/ \
              --header-filter='(src|include)/' \
              --checks='-*,clang-analyzer-core.*,clang-analyzer-cplusplus.*,clang-analyzer-unix.*,bugprone-use-after-move,bugprone-unused-return-value' \
              --warnings-as-errors='clang-analyzer-core.*,clang-analyzer-cplusplus.*,clang-analyzer-unix.*,bugprone-use-after-move,bugprone-unused-return-value' 2>&1

  compile-warnings:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install LLVM + deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq wget lsb-release software-properties-common gnupg
          wget -q https://apt.llvm.org/llvm.sh && chmod +x llvm.sh && sudo ./llvm.sh 21 all
          sudo apt-get install -y -qq libclang-21-dev liblld-21-dev cmake g++ libeigen3-dev
      - name: Build with -Werror
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_DIR=/usr/lib/llvm-21/lib/cmake/llvm \
            -DClang_DIR=/usr/lib/llvm-21/lib/cmake/clang \
            -DLLD_DIR=/usr/lib/llvm-21/lib/cmake/lld \
            -DCMAKE_CXX_FLAGS="-Werror"
          cmake --build build -j$(nproc) 2>&1
